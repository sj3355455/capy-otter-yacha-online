name: Deploy to itch.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          mkdir -p dist
          cp index.html dist/ 2>/dev/null || true
          cp *.js dist/ 2>/dev/null || true
          cp *.css dist/ 2>/dev/null || true
          if [ -d "image" ]; then cp -r image dist/; fi
          if [ -d "sound" ]; then cp -r sound dist/; fi
          if [ -d "bgm" ]; then cp -r bgm dist/; fi
          if [ -d "character" ]; then cp -r character dist/; fi
          if [ -d "map" ]; then cp -r map dist/; fi
          if [ -d "victory" ]; then cp -r victory dist/; fi
          if [ -d "skill" ]; then cp -r skill dist/; fi
          if [ -d "sound effect" ]; then cp -r "sound effect" dist/; fi

      - name: Download Butler (Stable Mirror)
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
          unzip -o butler.zip
          chmod +x linux-amd64/butler
          ./linux-amd64/butler -V
          
      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
        run: |
          ./linux-amd64/butler push dist sole0914/capy-otter-yacha:html5
